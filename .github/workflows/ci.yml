name: CI — local-vbs-myoverview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── PHP lint ───────────────────────────────────────────────────────────────
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none
          coverage: none

      - name: Lint PHP files
        run: |
          set -e
          FAIL=0
          while IFS= read -r -d '' file; do
            php -l "$file" >/dev/null || FAIL=1
          done < <(find classes db -name "*.php" -print0)
          php -l version.php >/dev/null || FAIL=1
          [ "$FAIL" -eq 0 ] && echo "PHP lint passed" || { echo "PHP lint FAILED"; exit 1; }

  # ── PHPUnit on Moodle 4.4 ──────────────────────────────────────────────────
  phpunit:
    name: PHPUnit (Moodle 4.4 / PHP 8.1)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB: moodle
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Plugin source checked out into ./plugin so moodle-plugin-ci can find it.
      - uses: actions/checkout@v4
        with:
          path: plugin

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pgsql, zip, gd, curl, soap, intl, mbstring, xml
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        # composer create-project is required (not global require) so that the
        # "repositories" block in moodle-plugin-ci's own composer.json is
        # inherited — without it composer cannot resolve moodle-local_ci.
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install Moodle + plugin
        # Omit --no-init so that phpunit bootstrap runs as part of install.
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-type pgsql \
            --db-user moodle \
            --db-pass moodle \
            --db-host 127.0.0.1
        env:
          MOODLE_BRANCH: MOODLE_404_STABLE
          DB: pgsql

      - name: PHPUnit
        run: moodle-plugin-ci phpunit ./plugin
        env:
          MOODLE_BRANCH: MOODLE_404_STABLE
          DB: pgsql
